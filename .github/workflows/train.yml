name: Train (weekly)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.1"

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(c("pins", "digest", "here", "tibble",
                             "knitr", "rmarkdown"))

      - name: Render train.qmd
        run: quarto render apps/recovery_training/train.qmd

      - name: Commit updated pin and HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pins apps/recovery_training/train.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: retrain $(date -u +'%Y-%m-%d')"
            git push
          fi
