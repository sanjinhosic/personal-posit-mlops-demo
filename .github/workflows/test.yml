name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.1"

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(c("pins", "digest", "here", "tibble", "testthat"))

      - name: Run tests
        run: Rscript tests/testthat.R
